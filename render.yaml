services:
  - type: web
    name: nintendo-stock-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DB_PATH
        value: /tmp/stock_history.db
    scaling:
      minInstances: 1
      maxInstances: 3
